const ANIM_TIMING = { idle: 200, walk: 120, attack: 100, death: 150 };

// ─── Game State ───────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const stateEl = document.getElementById('state');
const SCALE = 4;
let px = 224, py = 160;  // player position (center of canvas-ish)
let state = 'idle';
let frame = 0;
let lastFrameTime = 0;
let facing = 'south';
const keys = {};
const SPEED = 2;

// ─── Input ────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' && state !== 'death') { state = 'attack'; frame = 0; lastFrameTime = performance.now(); }
  if (e.key === 'x' || e.key === 'X') { state = 'death'; frame = 0; lastFrameTime = performance.now(); }
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── Render Functions ─────────────────────────────────────────────────
function drawSprite(spriteData, x, y) {
  for (let row = 0; row < spriteData.length; row++) {
    for (let col = 0; col < spriteData[row].length; col++) {
      const c = spriteData[row][col];
      const color = P[c];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(x + col * SCALE, y + row * SCALE, SCALE, SCALE);
    }
  }
}

function drawFloor() {
  const tileSize = 32;
  for (let y = 0; y < canvas.height; y += tileSize) {
    for (let x = 0; x < canvas.width; x += tileSize) {
      const isAlt = ((x / tileSize) + (y / tileSize)) % 2 === 0;
      ctx.fillStyle = isAlt ? FLOOR_A : FLOOR_B;
      ctx.fillRect(x, y, tileSize, tileSize);
    }
  }
}

// ─── Game Loop ────────────────────────────────────────────────────────
function gameLoop(timestamp) {
  // Update movement
  if (state !== 'death' && state !== 'attack') {
    let moving = false;
    if (keys['ArrowLeft'])  { px -= SPEED; moving = true; facing = 'west'; }
    if (keys['ArrowRight']) { px += SPEED; moving = true; facing = 'east'; }
    if (keys['ArrowUp'])    { py -= SPEED; moving = true; facing = 'north'; }
    if (keys['ArrowDown'])  { py += SPEED; moving = true; facing = 'south'; }
    state = moving ? 'walk' : 'idle';
  }

  // Clamp position
  px = Math.max(0, Math.min(canvas.width - 32 * SCALE, px));
  py = Math.max(0, Math.min(canvas.height - 32 * SCALE, py));

  // Update animation frame
  const timing = ANIM_TIMING[state] || 200;
  if (timestamp - lastFrameTime > timing) {
    const maxFrames = SPRITES[state].length;
    if (state === 'attack' || state === 'death') {
      if (frame < maxFrames - 1) { frame++; }
      else if (state === 'attack') { state = 'idle'; frame = 0; }
      // death stays on last frame
    } else {
      frame = (frame + 1) % maxFrames;
    }
    lastFrameTime = timestamp;
  }

  // Draw
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawFloor();

  const spriteData = SPRITES[state][frame % SPRITES[state].length];
  drawSprite(spriteData, px, py);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(px + 16 * SCALE, py + 30 * SCALE, 12 * SCALE, 3 * SCALE, 0, 0, Math.PI * 2);
  ctx.fill();

  stateEl.textContent = `State: ${state} | Frame: ${frame} | Direction: ${facing} | Position: (${px}, ${py})`;
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
