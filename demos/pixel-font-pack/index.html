  .controls{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:1rem}

  .ctrl-btn:hover{background:#2a2a3a}
  canvas{border:2px solid #2a2a3a;image-rendering:pixelated;image-rendering:crisp-edges;margin-bottom:1rem}
  .size-controls{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem;color:#6a6a7a;font-size:.8rem}
  .size-btn{background:#1a1a2e;color:#6a6a7a;border:1px solid #2a2a3a;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:.8rem}
  .size-btn:hover{background:#2a2a3a;color:#e0e0e0}
  .footer{color:#4a4a5a;font-size:.7rem;margin-top:1rem}
</style>

<body>
<h1>PIXEL FONT PACK</h1>
<p class="info">Type text below to see it rendered in pixel fonts. Switch fonts with the buttons.</p>

<div class="input-row">
  <input type="text" id="textInput" value="Hello World" maxlength="40" spellcheck="false">
</div>

<div class="controls" id="controls">
  <button class="ctrl-btn active" data-font="regular">Regular</button>
  <button class="ctrl-btn" data-font="bold">Bold</button>
  <button class="ctrl-btn" data-font="handwritten">Handwritten</button>
</div>

<div class="size-controls">
  <span>Scale:</span>
  <button class="size-btn" onclick="setScale(2)">2x</button>
  <button class="size-btn" onclick="setScale(3)">3x</button>
  <button class="size-btn" onclick="setScale(4)">4x</button>
  <button class="size-btn" onclick="setScale(6)">6x</button>
</div>

const canvas = document.getElementById('demo');
const ctx = canvas.getContext('2d');
const input = document.getElementById('textInput');
let currentFont = 'regular';
let scale = 4;

function setScale(s) {
  scale = s;
  render();
}

function render() {
  const text = input.value;
  const font = FONTS[currentFont];
  const glyphs = font.glyphs;
  const color = font.color;

  // Calculate canvas size
  const charW = 8 * scale;
  const spacing = 1 * scale;
  const totalW = Math.max(720, text.length * (charW + spacing) + spacing * 2);
  const totalH = 8 * scale + scale * 4;
  canvas.width = totalW;
  canvas.height = totalH;

  // Clear
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, totalW, totalH);

  // Draw each character
  let xOff = scale * 2;
  const yOff = scale * 2;

  for (let ci = 0; ci < text.length; ci++) {
    const ch = text[ci];
    const glyph = glyphs[ch];
    if (!glyph) {
      // Unknown char, skip space
      xOff += charW + spacing;
      continue;
    }

    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 8; col++) {
        if (glyph[row][col] === '1') {
          ctx.fillStyle = color;
          ctx.fillRect(xOff + col * scale, yOff + row * scale, scale, scale);
        }
      }
    }
    xOff += charW + spacing;
  }
}

// ─── Controls ─────────────────────────────────────────────────────
document.querySelectorAll('.ctrl-btn[data-font]').forEach(btn => {
  btn.onclick = () => {
    currentFont = btn.dataset.font;
    document.querySelectorAll('.ctrl-btn[data-font]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
});

input.addEventListener('input', render);

// Initial render
render();
