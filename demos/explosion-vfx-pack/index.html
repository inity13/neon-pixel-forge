const canvas = document.getElementById('demo');
const ctx = canvas.getContext('2d');
const SCALE = 2;
let activeExplosions = [];
let selectedEffect = 'fire_explosion';

// ─── Draw Functions ──────────────────────────────────────────────────
function drawFrame(frameData, x, y) {
  for (let row = 0; row < 32; row++) {
    for (let col = 0; col < 32; col++) {
      const c = frameData[row][col];
      const color = P[c];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(x + col * SCALE, y + row * SCALE, SCALE, SCALE);
    }
  }
}

function spawnExplosion(x, y) {
  const effect = EFFECTS[selectedEffect];
  activeExplosions.push({
    type: selectedEffect,
    x: x - 32,
    y: y - 32,
    frame: 0,
    timer: 0,
    ms: effect.ms,
    totalFrames: effect.frames.length
  });
}

// ─── Starfield Background ────────────────────────────────────────────
const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * 640,
    y: Math.random() * 480,
    s: Math.random() * 2 + 0.5,
    b: Math.random()
  });
}

let lastTime = 0;
function render(time) {
  const dt = time - lastTime;
  lastTime = time;

  // Clear
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, 640, 480);

  // Stars
  stars.forEach(s => {
    s.b += 0.01;
    const brightness = Math.sin(s.b) * 0.4 + 0.6;
    const alpha = Math.floor(brightness * 255).toString(16).padStart(2, '0');
    ctx.fillStyle = '#ffffff' + alpha;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });

  // Update and draw explosions
  activeExplosions = activeExplosions.filter(ex => {
    ex.timer += dt;
    if (ex.timer >= ex.ms) {
      ex.timer -= ex.ms;
      ex.frame++;
    }
    if (ex.frame >= ex.totalFrames) return false;
    const effect = EFFECTS[ex.type];
    drawFrame(effect.frames[ex.frame], ex.x, ex.y);
    return true;
  });

  requestAnimationFrame(render);
}

// ─── Controls ────────────────────────────────────────────────────────
const controlsDiv = document.getElementById('controls');
Object.keys(EFFECTS).forEach(name => {
  const btn = document.createElement('button');
  btn.className = 'ctrl-btn' + (name === selectedEffect ? ' active' : '');
  btn.textContent = name.replace(/_/g, ' ');
  btn.onclick = () => {
    selectedEffect = name;
    controlsDiv.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
  controlsDiv.appendChild(btn);
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  spawnExplosion(e.clientX - rect.left, e.clientY - rect.top);
});

// Auto-spawn demo explosions
setInterval(() => {
  if (activeExplosions.length < 2) {
    spawnExplosion(100 + Math.random() * 440, 80 + Math.random() * 320);
  }
}, 1500);

requestAnimationFrame(render);
