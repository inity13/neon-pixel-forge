<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Demo — Pixel Forge</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;color:#e0e0e0;font-family:'Courier New',monospace;padding:2rem;display:flex;flex-direction:column;align-items:center}
  h1{color:#c8a848;margin-bottom:.5rem}
  .info{color:#7a8a9a;margin-bottom:1.5rem;font-size:.85rem}
  .inventory{display:grid;grid-template-columns:repeat(5,80px);gap:4px;background:#1a1a2e;padding:8px;border-radius:8px;border:2px solid#2a2a4a}
  .slot{width:80px;height:80px;background:#0a0a12;border:1px solid#2a2a4a;border-radius:4px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center}
  .slot:hover{border-color:#c8a848}
  .slot canvas{image-rendering:pixelated;image-rendering:crisp-edges}
  .slot.selected{border-color:#f1c40f;box-shadow:0 0 8px rgba(241,196,15,.3)}
  .tooltip{position:fixed;background:#1a1a2e;border:1px solid#c8a848;border-radius:6px;padding:10px;font-size:.75rem;pointer-events:none;display:none;z-index:10;max-width:200px}
  .tooltip .tt-name{color:#e0e0e0;font-size:.85rem;font-weight:bold}
  .tooltip .tt-rarity{font-size:.75rem}
  .tooltip .tt-desc{color:#7a8a9a;margin-top:4px}
  .tooltip .tt-stats{color:#c8a848;margin-top:4px}
</style>
</head>
<body>
<h1>🎒 Inventory Demo</h1>
<p class="info">Hover over weapons to see their stats. Click to select.</p>
<div class="inventory" id="inv"></div>
<div class="tooltip" id="tip"></div>

<script>
const P={
  '_':null,'O':'#1a1a2e','i':'#808890','I':'#505860','S':'#a0a8b0','s':'#b0b8c0',
  'W':'#6b4226','w':'#8b6246','L':'#5a3a1e','R':'#cc3030','B':'#3060cc','G':'#30a030',
  'b':'#e0d8c0','1':'#808080','2':'#2ecc71','3':'#3498db','4':'#9b59b6','5':'#f1c40f'
};
const ITEMS=[
  {name:'Iron Sword',rarity:'common',desc:'A basic iron sword.',stats:'DMG 8',pixels:["________________________________","________________________________","_____________________________Os_","____________________________OsO_","___________________________OsO__","__________________________OsO___","_________________________OsO____","________________________OsO_____","_______________________OiO______","______________________OiO_______","_____________________OiO________","____________________OiO_________","___________________OiO__________","__________________OiO___________","_________________OiO____________","________________OiO_____________","_______________OiO______________","______________OiO_______________","_____________OiO________________","____________OiO_________________","___________OIO__________________","__________OIO___________________","_________OWO____________________","________OWWO____________________","_______OOLWLOO__________________","________OWWO____________________","_________OWO____________________","__________OWO___________________","___________OO___________________","________________________________","________________________________","________________________________"]},
  {name:'Fire Blade',rarity:'rare',desc:'Burns with eternal flame.',stats:'DMG 22',pixels:["________________________________","____________________________R3__","___________________________R33R_","__________________________R3O3__","_________________________R3Os___","________________________R_OsO___","_________________________OsO____","________________________OsO_____","_______________________OsO______","______________________OiO_______","_____________________OiO________","____________________OiO_________","___________________OiO__________","__________________OiO___________","_________________OiO____________","________________OiO_____________","_______________OiO______________","______________OiO_______________","_____________OiO________________","____________OiO_________________","___________OIO__________________","__________OIO___________________","_________ORWO___________________","________OWRWO___________________","_______OOLRLOO__________________","________OWRWO___________________","_________OWO____________________","__________OWO___________________","___________OO___________________","________________________________","________________________________","________________________________"]},
  {name:'Battle Axe',rarity:'common',desc:'Heavy double-headed axe.',stats:'DMG 12',pixels:["________________________________","________________________________","________________________________","________OOO______OOO___________","_______OIIIO____OIIIO__________","______OIiiiIO__OIiiiIO_________","_____OIiiiiIOOOIiiiiIO_________","_____OIiiiiIiiiIiiiiIO_________","______OIiiiIiiiIiiiIO__________","_______OOOOIiiiIOOOO___________","____________OiiiO______________","____________OiiiO______________","____________OWWWO______________","____________OWWWO______________","____________OWWWO______________","____________OLLLO______________","____________OWWWO______________","____________OWWWO______________","____________OLLLO______________","____________OWWWO______________","____________OWWWO______________","____________OWWWO______________","____________OLLLO______________","____________OWWWO______________","____________OWWWO______________","____________OWWWO______________","_____________OOO_______________","________________________________","________________________________","________________________________","________________________________","________________________________"]},
  {name:'Short Bow',rarity:'common',desc:'Light wooden bow.',stats:'DMG 6 RNG 5',pixels:["________________________________","________________________________","________________________________","________________________________","___________OO___________________","__________OWWO__________________","_________OW__WO_________________","________OW____WO________________","_______OW______WO_______________","______OW_______WOOOOOO__________","_____OW________LLLLLLO__________","____OW_________WOOOOOO__________","____OW________WO________________","____OW_______WO_________________","_____OW_____WO__________________","______OW___WO___________________","_______OW_WO____________________","________OWWO____________________","_________OO_____________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________"]},
  {name:'Lightning Staff',rarity:'epic',desc:'Channels raw lightning.',stats:'DMG 28 RNG 4',pixels:["________________________________","___________O44O_________________","__________O4444O________________","__________O4BB4O________________","__________O4BB4O________________","__________O4444O________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","___________O44O_________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","___________O44O_________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","___________O44O_________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","___________OWWO_________________","____________OO__________________","________________________________","________________________________","________________________________","________________________________"]},
  {name:'Plasma Pistol',rarity:'uncommon',desc:'Compact plasma sidearm.',stats:'DMG 14 RNG 6',pixels:["________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","______OOOOOOOOOOOOOO____________","_____OIIIIIIIIIIIiiO____________","____OIiiiiiiiiiiiiiO2O__________","____OIiiiiiiiiiiiiO2O___________","____OIiiiiiiiiiiiiOO____________","____OIiiOOOOiiiiIO_____________","____OIiiOWWOiiiiIO_____________","_____OOOOWWOiiiIO______________","________OWWOOIIO_______________","________OWWO_OO________________","________OWWO____________________","_________OO_____________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________"]},
  {name:'Tower Shield',rarity:'uncommon',desc:'Iron shield, head to knee.',stats:'DEF 15 BLK 60%',pixels:["________________________________","________________________________","________________________________","________________________________","________OOOOOOOOOOOO____________","_______OiiiiiiiiiiiiO___________","______OiSSSSSSSSSSSSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSS2SSSSS2SSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSS2SSSSS2SSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSS2SSSSS2SSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSSSSSSSSSSSSiO__________","______OiSSSSSSSSSSSSiO__________","_______OiiiiiiiiiiiiO___________","________OOOOOOOOOOOO____________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________","________________________________"]},
  null,null,null,null,null,null,null,null,null,null,null,null,null
];
const rarColors={common:'#808080',uncommon:'#2ecc71',rare:'#3498db',epic:'#9b59b6',legendary:'#f1c40f'};

const inv=document.getElementById('inv');
const tip=document.getElementById('tip');
ITEMS.forEach((item,i)=>{
  const slot=document.createElement('div');
  slot.className='slot';
  if(item){
    const c=document.createElement('canvas');
    c.width=64;c.height=64;
    const ctx=c.getContext('2d');
    item.pixels.forEach((row,y)=>[...row].forEach((ch,x)=>{
      const color=P[ch];if(!color)return;
      ctx.fillStyle=color;ctx.fillRect(x*2,y*2,2,2);
    }));
    slot.appendChild(c);
    slot.addEventListener('mouseenter',e=>{
      tip.style.display='block';
      tip.innerHTML=`<div class="tt-name">${item.name}</div><div class="tt-rarity" style="color:${rarColors[item.rarity]}">${item.rarity.toUpperCase()}</div><div class="tt-desc">${item.desc}</div><div class="tt-stats">${item.stats}</div>`;
    });
    slot.addEventListener('mousemove',e=>{tip.style.left=e.clientX+12+'px';tip.style.top=e.clientY+12+'px';});
    slot.addEventListener('mouseleave',()=>{tip.style.display='none';});
    slot.addEventListener('click',()=>{document.querySelectorAll('.slot').forEach(s=>s.classList.remove('selected'));slot.classList.add('selected');});
  }
  inv.appendChild(slot);
});
</script>
</body>
</html>
