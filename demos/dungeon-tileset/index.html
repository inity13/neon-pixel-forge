<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dungeon Map Demo — Pixel Forge</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a12;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#ccc}
  h1{color:#c8a848;margin-bottom:.5rem}
  .info{color:#6a6a7a;margin-bottom:1rem;font-size:.85rem}
  canvas{border:2px solid#2a2a3a;image-rendering:pixelated;image-rendering:crisp-edges}
</style>
</head>
<body>
<h1>🏰 Dungeon Map Demo</h1>
<p class="info">A sample 20×15 dungeon room rendered from tilemap data</p>
<canvas id="map" width="640" height="480"></canvas>

<script>
const P={
  '_':null,'V':'#0a0a12','0':'#2a2a3a','1':'#4a4a5a','2':'#6a6a7a',
  'B':'#5a4030','b':'#7a6050','W':'#6b4226','w':'#8b6246','M':'#808890',
  'G':'#c8a848','F':'#ff8830','f':'#ffcc44','A':'#3060a0','L':'#cc3300',
  'm':'#3a6a2a','R':'#8a1818','O':'#1a1a2e','3':'#6a6a7a','r':'#ff4400'
};

// Tile data (subset for the demo)
const TD={
fs:["1111111111111111","1112111111111111","1111111111211111","1111111111111111","1111111111111111","1111211111111111","1111111111111111","1111111111111211","1111111111111111","1111111121111111","1111111111111111","1111111111111111","1112111111111111","1111111111111111","1111111111121111","1111111111111111"],
wt:["OOOOOOOOOOOOOOOO","O001001001001001","O012012012012012","O012012012012012","O012012012012012","O001001001001001","OOOOOOOOOOOOOOOO","0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000"],
wb:["0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000","0000000000000000","OOOOOOOOOOOOOOOO","O001001001001001","O012012012012012","O012012012012012","O012012012012012","O001001001001001","OOOOOOOOOOOOOOOO"],
wl:["OO00000000000000","O200000000000000","O100000000000000","O100000000000000","O100000000000000","O200000000000000","OO00000000000000","O200000000000000","O100000000000000","O100000000000000","O100000000000000","O200000000000000","OO00000000000000","O200000000000000","O100000000000000","O100000000000000"],
wr:["00000000000000OO","000000000000002O","000000000000001O","000000000000001O","000000000000001O","000000000000002O","00000000000000OO","000000000000002O","000000000000001O","000000000000001O","000000000000001O","000000000000002O","00000000000000OO","000000000000002O","000000000000001O","000000000000001O"],
ct:["OOOOOOOOOOOOOOOO","OO2OO12012012012","O201012012012012","O101012012012012","O101001001001001","O201OOOOOOOOOOOO","OO000000000000OO","O2000000000000OO","O1000000000000OO","O1000000000000OO","O1000000000000OO","O2000000000000OO","OO000000000000OO","O2000000000000OO","O1000000000000OO","O1000000000000OO"],
dc:["OOOOOOOOOOOOOOOO","OWWWWwWWWwWWWWWO","OWWWWWWWWWWWWWWO","OWWWWWWWWWWWWWWO","OWWWWWWWWWWWWWWO","OWWWWwWWWwWWWWWO","OWWWWWWWWWWWWWWO","OWWWWWWGWWWWWWWO","OWWWWWWWWWWWWWWO","OWWWWwWWWwWWWWWO","OWWWWWWWWWWWWWWO","OWWWWWWWWWWWWWWO","OWWWWWWWWWWWWWWO","OWWWWwWWWwWWWWWO","OWWWWWWWWWWWWWWO","OOOOOOOOOOOOOOOO"],
ch:["________________","________________","________________","________________","________________","___OOOOOOOOOO___","__OGGGGGGGGGO___","__OWWWGWGWWWO___","__OWWWWGWWWWO___","__OWWWWWWWWWO___","__OWWWWWWWWWO___","__OWWWWWWWWWO___","__OOOOOOOOOOOO__","________________","________________","________________"],
tf:["________________","________________","______fF________","_____fFFf_______","______FF________","______WW________","______WW________","______WW________","______WW________","______WW________","______WW________","________________","________________","________________","________________","________________"],
wa:["AAAAAAAAAAAAAAAA","AAAAAAAAAAAAAAAA","AAAAAAAAAAAAAAAA","AAAA3AAAAAAAAAAA","AAAAAAAAAAAAAAAA","AAAAAAAAAA3AAAAA","AAAAAAAAAAAAAAAA","AAAAAAAAAAAAAAAA","AA3AAAAAAAAAAAAA","AAAAAAAAAAAAAAAA","AAAAAAAAAAAAAAAA","AAAAAAAA3AAAAAAA","AAAAAAAAAAAAAAAA","AAAAAAAAAAAAAAAA","AAAAAAAAAAAAAAAA","AAAA3AAAAAAAAAAA"],
sk:["________________","________________","________________","________________","________________","________________","____OOOOOO______","___O222222O_____","___O2O22O2O_____","___O222222O_____","____O2OO2O______","____OOOOOO______","_____O22O_______","_____OOOO_______","________________","________________"]
};

// Map layout: 20x15 grid
// ct=corner-tl, wt=wall-top, wl=wall-left, wr=wall-right, wb=wall-bottom
// fs=floor-stone, dc=door, ch=chest, tf=torch, wa=water, sk=skull
const MAP=[
  ['ct','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt','wt'],
  ['wl','fs','fs','fs','fs','fs','fs','fs','fs','dc','fs','fs','fs','fs','fs','fs','fs','fs','fs','wr'],
  ['wl','fs','tf','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','tf','fs','fs','wr'],
  ['wl','fs','fs','fs','fs','fs','fs','ch','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','wr'],
  ['wl','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','wa','wa','wa','fs','fs','fs','wr'],
  ['wl','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','wa','wa','wa','fs','fs','fs','wr'],
  ['wl','fs','fs','sk','fs','fs','fs','fs','fs','fs','fs','fs','fs','wa','wa','wa','fs','fs','fs','wr'],
  ['wl','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','wr'],
  ['wl','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','wr'],
  ['wl','fs','tf','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','tf','fs','fs','wr'],
  ['wl','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','wr'],
  ['wl','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','ch','wr'],
  ['wl','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','fs','wr'],
  ['wl','fs','fs','fs','fs','fs','fs','fs','fs','dc','fs','fs','fs','fs','fs','fs','fs','fs','fs','wr'],
  ['wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb','wb']
];

const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
const SCALE = 2;

function drawTile(tileData, tx, ty) {
  for (let y = 0; y < 16; y++) {
    for (let x = 0; x < 16; x++) {
      const c = tileData[y][x];
      const color = P[c];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(tx + x * SCALE, ty + y * SCALE, SCALE, SCALE);
    }
  }
}

// Draw the map
for (let row = 0; row < MAP.length; row++) {
  for (let col = 0; col < MAP[row].length; col++) {
    const tileKey = MAP[row][col];
    const tileData = TD[tileKey];
    if (tileData) {
      // Draw floor underneath decorations/objects
      if (['ch','tf','sk'].includes(tileKey)) {
        drawTile(TD.fs, col * 32, row * 32);
      }
      drawTile(tileData, col * 32, row * 32);
    }
  }
}

// Animate torches
let torchFrame = 0;
const torchTiles = [TD.tf]; // Would cycle through f1/f2/f3 with more frames
setInterval(() => {
  torchFrame = (torchFrame + 1) % 3;
  // Redraw torch positions
  const torchPositions = [[2,2],[16,2],[2,9],[16,9]];
  torchPositions.forEach(([col,row]) => {
    drawTile(TD.fs, col*32, row*32);
    drawTile(TD.tf, col*32, row*32);
  });
}, 200);
</script>
</body>
</html>
