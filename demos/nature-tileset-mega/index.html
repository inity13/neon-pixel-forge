// Nature scene tilemap (20×15) — keys reference TD tile data
// g1=grass1, g2=grass2, g3=dark grass, w0/w1/w2=water frames, d1=dirt, tt=trunk, tc=canopy, pt=pine, bu=bush, fr=flowers, mb=mountain base, mp=mountain peak, br=bridge
const MAP=[
['mp','mp','g2','g2','g1','g1','g1','g2','g1','g1','g1','g2','g1','g1','g1','g2','g2','g1','g1','g1'],
['mb','mb','g2','g1','g1','g2','g1','g1','g1','g1','g2','g1','g1','g1','g1','g1','g2','g1','g1','g2'],
['g3','g3','g2','g1','tc','g1','g1','g1','tc','g1','g1','g1','tc','g1','g1','g1','g1','g1','tc','g1'],
['g2','g3','g1','g1','tt','g1','bu','g1','tt','g1','g1','g1','tt','g1','g1','bu','g1','g1','tt','g1'],
['g1','g2','g1','fr','g1','g1','g1','g1','g1','g1','d1','d1','d1','g1','g1','g1','g1','fr','g1','g1'],

['g1','g2','g1','g1','g1','g1','d1','d1','g1','g1','g1','g1','pt','g1','g1','d1','d1','g1','g1','g1'],

['g2','g1','g2','g1','g1','g2','g1','g1','g2','g1','g1','g2','g1','g1','g2','g1','g1','g2','g1','g1'],
];

const WATER_FRAMES=['w0','w1','w2'];
let camX=0, camY=0, time=0;

function drawTile(tileKey, sx, sy, s) {
    const data = TD[tileKey];
    if (!data) return;
    for (let py=0; py<data.length; py++) {
        for (let px=0; px<data[py].length; px++) {
            const c = P[data[py][px]];
            if (!c) continue;
            ctx.fillStyle = c;
            const pixScale = s / 16;
            ctx.fillRect(sx + px*pixScale, sy + py*pixScale, Math.ceil(pixScale), Math.ceil(pixScale));
        }
    }
}

function render() {
    time++;
    ctx.fillStyle = '#0a1a0a';
    ctx.fillRect(0, 0, W, H);

    const waterFrame = WATER_FRAMES[Math.floor(time / 25) % 3];

    const cols = Math.ceil(W / TS) + 1;
    const rows = Math.ceil(H / TS) + 1;
    const startCol = Math.floor(camX / TS);
    const startRow = Math.floor(camY / TS);
    const offX = -(camX % TS);
    const offY = -(camY % TS);

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const mapR = startRow + r;
            const mapC = startCol + c;
            if (mapR < 0 || mapR >= MAP.length || mapC < 0 || mapC >= MAP[0].length) continue;
            let key = MAP[mapR][mapC];
            // Animate water tiles
            if (key === 'w0' || key === 'w1' || key === 'w2') key = waterFrame;
            drawTile(key, offX + c * TS, offY + r * TS, TS);
        }
    }

    // Mini coordinate display
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, 120, 20);
    ctx.fillStyle = '#7ec850';
    ctx.font = '10px monospace';
    ctx.fillText(`Scroll: ${Math.floor(camX)},${Math.floor(camY)}`, 4, 14);

    requestAnimationFrame(render);
}

const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => keys[e.key] = false);

function updateCamera() {
    const spd = 3;
    if (keys['ArrowLeft']) camX = Math.max(0, camX - spd);
    if (keys['ArrowRight']) camX = Math.min(MAP[0].length * TS - W, camX + spd);
    if (keys['ArrowUp']) camY = Math.max(0, camY - spd);
    if (keys['ArrowDown']) camY = Math.min(MAP.length * TS - H, camY + spd);
    requestAnimationFrame(updateCamera);
}

updateCamera();
render();
</script>
