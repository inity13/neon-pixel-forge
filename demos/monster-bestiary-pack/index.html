// ─── Game State ─────────────────────────────────────────────────────────
let currentMonster = 0;
let monsterHP = MON_DATA[0].hp;
let playerHP = 50;
let playerMaxHP = 50;
let playerAtk = 10;
let damageNumbers = [];  // {x, y, text, color, life}
let shakeTimer = 0;
let attackAnim = 0;
let gameOver = false;
let victory = false;
let kills = 0;
let time = 0;

function resetFight() {
    monsterHP = MON_DATA[currentMonster].hp;
    attackAnim = 0;
    shakeTimer = 0;
}

function resetGame() {
    currentMonster = 0;
    monsterHP = MON_DATA[0].hp;
    playerHP = playerMaxHP;
    damageNumbers = [];
    shakeTimer = 0;
    attackAnim = 0;
    gameOver = false;
    victory = false;
    kills = 0;
}

function renderSprite(data, x, y, scale, shake) {
    const ox = shake ? Math.floor(Math.random() * 6 - 3) : 0;
    const oy = shake ? Math.floor(Math.random() * 6 - 3) : 0;
    for (let py = 0; py < data.length; py++) {
        for (let px = 0; px < data[py].length; px++) {
            const c = PAL[data[py][px]];
            if (!c) continue;
            ctx.fillStyle = c;
            ctx.fillRect(x + ox + px * scale, y + oy + py * scale, scale, scale);
        }
    }
}

function drawBar(x, y, w, h, val, max, color, label) {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#333';
    ctx.strokeRect(x, y, w, h);
    const fill = Math.max(0, (val / max) * w);
    ctx.fillStyle = color;
    ctx.fillRect(x + 1, y + 1, fill - 2, h - 2);
    ctx.fillStyle = '#e0e8ff';
    ctx.font = '11px monospace';
    ctx.fillText(`${label}: ${Math.max(0,val)}/${max}`, x + 4, y + h - 3);
}

function render() {
    time++;
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0a2a');
    grad.addColorStop(1, '#1a0a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Ground
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 280, W, 80);
    ctx.strokeStyle = '#333';
    ctx.beginPath(); ctx.moveTo(0, 280); ctx.lineTo(W, 280); ctx.stroke();

    const mon = MON_DATA[currentMonster];
    const isAttacking = attackAnim > 0;
    const spriteData = isAttacking ? mon.attack : mon.idle;
    const shaking = shakeTimer > 0;

    // Monster sprite (centered)
    const scale = 4;
    const sx = W / 2 - 64;
    const sy = 100;
    renderSprite(spriteData, sx, sy, scale, shaking);

    // Monster name + type
    ctx.fillStyle = mon.color;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(mon.name, W / 2, 80);
    ctx.textAlign = 'left';

    // Monster HP bar
    drawBar(W / 2 - 100, 46, 200, 18, monsterHP, mon.hp, mon.color, 'HP');

    // Player HP bar
    drawBar(20, H - 40, 180, 18, playerHP, playerMaxHP, '#2ecc71', 'Player HP');

    // Kill counter
    ctx.fillStyle = '#f1c40f';
    ctx.font = '12px monospace';
    ctx.fillText(`Kills: ${kills}`, W - 100, H - 24);

    // Damage numbers
    for (let i = damageNumbers.length - 1; i >= 0; i--) {
        const dn = damageNumbers[i];
        dn.y -= 1.5;
        dn.life--;
        ctx.globalAlpha = Math.max(0, dn.life / 30);
        ctx.fillStyle = dn.color;
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(dn.text, dn.x, dn.y);
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1;
        if (dn.life <= 0) damageNumbers.splice(i, 1);
    }

    // Timers
    if (shakeTimer > 0) shakeTimer--;
    if (attackAnim > 0) attackAnim--;

    // Game over / victory overlay
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ff3030';
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('DEFEATED', W / 2, H / 2 - 10);
        ctx.fillStyle = '#6080a0';
        ctx.font = '14px monospace';
        ctx.fillText(`Kills: ${kills}. Press R to restart.`, W / 2, H / 2 + 20);
        ctx.textAlign = 'left';
    }
    if (victory) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 32px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('VICTORY!', W / 2, H / 2 - 10);
        ctx.fillStyle = '#6080a0';
        ctx.font = '14px monospace';
        ctx.fillText('All monsters defeated! Press R to play again.', W / 2, H / 2 + 20);
        ctx.textAlign = 'left';
    }

    // Instructions
    if (!gameOver && !victory) {
        ctx.fillStyle = '#6080a0';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Click the monster to attack! Keys 1-6 to switch target.', W / 2, H - 6);
        ctx.textAlign = 'left';
    }

    requestAnimationFrame(render);
}

// ─── Combat Logic ───────────────────────────────────────────────────────
function playerAttack() {
    if (gameOver || victory) return;
    const mon = MON_DATA[currentMonster];
    // Player attacks monster
    const dmg = Math.max(1, playerAtk - mon.def + Math.floor(Math.random() * 4));
    monsterHP -= dmg;
    shakeTimer = 10;
    damageNumbers.push({
        x: W / 2 + Math.random() * 40 - 20,
        y: 140,
        text: `-${dmg}`,
        color: '#ff3030',
        life: 30
    });

    // Monster retaliates after delay
    setTimeout(() => {
        if (gameOver || victory) return;
        const monDmg = Math.max(1, mon.atk - 2 + Math.floor(Math.random() * 3));
        playerHP -= monDmg;
        attackAnim = 15;
        damageNumbers.push({
            x: 110 + Math.random() * 30,
            y: H - 50,
            text: `-${monDmg}`,
            color: '#ff6b35',
            life: 30
        });
        if (playerHP <= 0) {
            playerHP = 0;
            gameOver = true;
        }
    }, 300);

    // Check monster death
    if (monsterHP <= 0) {
        monsterHP = 0;
        kills++;
        damageNumbers.push({
            x: W / 2, y: 120,
            text: 'DEFEATED!',
            color: '#f1c40f',
            life: 45
        });
        // Heal player a bit
        playerHP = Math.min(playerMaxHP, playerHP + 5);
        // Next monster
        if (currentMonster < MON_DATA.length - 1) {
            setTimeout(() => {
                currentMonster++;
                resetFight();
            }, 600);
        } else {
            setTimeout(() => { victory = true; }, 600);
        }
    }
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    // Check if click is near monster sprite area
    if (mx > W/2 - 80 && mx < W/2 + 80 && my > 80 && my < 280) {
        playerAttack();
    }
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') resetGame();
    const num = parseInt(e.key);
    if (num >= 1 && num <= 6 && !gameOver && !victory) {
        currentMonster = num - 1;
        resetFight();
    }
});

render();
