<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Cancelled — Pixel Forge</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">

    <meta name="theme-color" content="#FF2D9B">

</head>
<body>
    <div class="status-page">
        <div class="status-card">
            <div class="status-card__icon">👋</div>
            <h1 class="status-card__title">No worries!</h1>
            <p class="status-card__text">

            </p>
            <a href="index.html" class="btn btn--primary">Back to the Store</a>
            <p class="status-card__text" style="margin-top: 20px; font-size: 0.85rem;">
                Changed your mind already? Just hit the button above and browse again.
            </p>
        </div>
    </div>
